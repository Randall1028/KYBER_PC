<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYBER — The Core Upgrade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
  :root {
    --void: #051222; --deep: #0d1726; --panel: #203955; --edge: #394D6B; --dim: #1B3048;
    --blue: #00a8ff; --text: #eef1f7; --muted: #8FAEC1;
    --gold-text: #ECDBC5; --gold-light: #C79C72; --gold-dark: #7C573D;
    --gold-border-light: #F1D3B6; --gold-border-dark: #907060;
    --success: #2ecc71; --warning: #ffc857; --error: #e63946;
    --shadow: rgba(0,5,16,0.5); --glow: 0 0 16px rgba(236,219,197,0.3);
    --font-body: 'Quicksand', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background: radial-gradient(circle at 50% -10%, var(--deep) 0%, var(--void) 55%); color: var(--text); font-family: var(--font-body); }
  body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.35) 0, transparent 100%),
      radial-gradient(1px 1px at 62% 26%, rgba(255,255,255,0.35) 0, transparent 100%),
      radial-gradient(1px 1px at 88% 16%, rgba(255,255,255,0.25) 0, transparent 100%),
      radial-gradient(1px 1px at 78% 72%, rgba(255,255,255,0.25) 0, transparent 100%); }
  .stage { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; padding: 54px 40px 44px; }

  .logo-wrap { display:flex; justify-content:center; margin-bottom:18px; }
  .logo { width: 88px; height: 88px; filter: drop-shadow(0 0 14px rgba(0,168,255,0.45)); animation: breathe 2.4s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { filter: drop-shadow(0 0 10px rgba(0,168,255,0.35)); } 50% { filter: drop-shadow(0 0 24px rgba(0,168,255,0.75)); } }

  h1 { font-size: 34px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold-text); text-shadow: var(--glow); text-transform: uppercase; text-align:center; }
  .sub { text-align:center; color: var(--gold-light); font-size: 14px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; margin-top: 8px; margin-bottom: 24px; }

  .intro { max-width: 520px; margin: 0 auto 26px; text-align:center; font-size: 13.5px; color: var(--muted); line-height: 1.75; }
  .intro .notice { margin-top: 14px; color: var(--text); font-weight: 600; }

  .overall { max-width: 560px; margin: 0 auto 28px; }
  .overall-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 8px; }
  .overall-label { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; font-weight: 600; }
  .overall-pct { font-size: 26px; font-weight: 700; color: var(--blue); }
  .track { height: 8px; background: var(--dim); border-radius: 4px; overflow: hidden; }
  .fill { height:100%; width:0%; border-radius:4px; background: linear-gradient(90deg, var(--blue), var(--success)); box-shadow: 0 0 10px rgba(0,168,255,0.5); transition: width 0.5s ease; }

  .items { max-width: 560px; margin: 0 auto; display:flex; flex-direction: column; gap: 10px; }
  .item { display:flex; align-items:center; gap:14px; padding: 16px 18px; border:1px solid transparent; border-radius: 14px;
    background-image: linear-gradient(135deg, var(--panel) 0%, var(--void) 100%), linear-gradient(135deg, var(--edge) 0%, var(--dim) 100%);
    background-origin: border-box; background-clip: padding-box, border-box; box-shadow: 0 2px 4px var(--shadow); }
  .item .ic { width: 40px; height: 40px; border-radius: 10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border:1px solid rgba(143,174,193,0.25); color: var(--muted); }
  .item .body { flex:1; min-width:0; }
  .item .name { font-size: 15px; font-weight: 600; }
  .item .minitrack { height: 5px; background: var(--dim); border-radius: 3px; overflow: hidden; margin-top: 9px; }
  .item .minifill { height:100%; width:0%; background: var(--blue); border-radius: 3px; transition: width 0.5s ease; }
  .item .activity { font-size: 11.5px; color: var(--muted); margin-top: 7px; height: 15px; line-height: 15px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; opacity: 0.85; }
  .badge { flex-shrink:0; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; letter-spacing: 0.02em; }
  .badge.queued { color: var(--muted); border:1px solid var(--edge); }
  .badge.going  { color: var(--blue); border:1px solid rgba(0,168,255,0.4); background: rgba(0,168,255,0.08); }
  .badge.done   { color: var(--success); border:1px solid rgba(46,204,113,0.4); background: rgba(46,204,113,0.08); }
  .badge.error  { color: var(--error); border:1px solid rgba(230,57,70,0.4); background: rgba(230,57,70,0.08); }
  .item.donerow .ic { color: var(--success); border-color: rgba(46,204,113,0.4); }
  .item.goingrow .ic { color: var(--blue); border-color: rgba(0,168,255,0.4); }
  .item.donerow .minifill { background: var(--success); }
  .item.goingrow .minifill { background: linear-gradient(90deg, var(--blue), #86d4ff, var(--blue)); background-size: 200% 100%; animation: shimmer 1.15s linear infinite; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  .cta { max-width: 560px; margin: 24px auto 0; }
  .btn-continue { width:100%; padding: 16px; border-radius: 12px; border:1px solid transparent; font-family: var(--font-body); font-size: 14px; font-weight: 700; color:#fff; cursor:pointer; letter-spacing: 0.02em;
    background-image: linear-gradient(135deg, #1D4268, #0D2C4D), linear-gradient(135deg, var(--edge), var(--dim));
    background-origin: border-box; background-clip: padding-box, border-box; box-shadow: 0 2px 4px var(--shadow); transition: all .2s; }
  .btn-continue:hover:not(:disabled) { background-image: linear-gradient(135deg, var(--gold-light), var(--gold-dark)), linear-gradient(135deg, var(--gold-border-light), var(--gold-border-dark)); color: var(--gold-text); }
  .btn-continue:disabled { opacity: 0.4; cursor: default; }
</style>

    <h1>KYBER</h1>
    <div class="sub">The Core Upgrade</div>
    <div class="intro" id="intro"></div>
    <div class="overall">
      <div class="overall-top">
        <div class="overall-label">PROGRESS</div>
        <div class="overall-pct" id="overallPct">0%</div>
      </div>
      <div class="track"><div class="fill" id="overallFill" style="width:0%"></div></div>
    </div>
    <div class="items" id="items"></div>
    <div class="cta"><button class="btn-continue" id="continueBtn" disabled>Please wait…</button></div>
  </div>

<script>
  const ICO = (p) => `<svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  // Names + icons are fixed here; the backend only sends key/state/pct/activity.
  const META = {
    logic: { name:'Logic Cores',                svg: ICO('<rect x="5" y="5" width="14" height="14" rx="1"/><rect x="9" y="9" width="6" height="6"/><line x1="3" y1="10" x2="5" y2="10"/><line x1="3" y1="14" x2="5" y2="14"/><line x1="10" y1="3" x2="10" y2="5"/><line x1="14" y1="3" x2="14" y2="5"/><line x1="19" y1="10" x2="21" y2="10"/><line x1="19" y1="14" x2="21" y2="14"/><line x1="10" y1="19" x2="10" y2="21"/><line x1="14" y1="19" x2="14" y2="21"/>') },
    lang:  { name:'Language Databanks',         svg: ICO('<ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6a8 3 0 0 0 16 0v-6"/><path d="M4 12v6a8 3 0 0 0 16 0v-6"/>') },
    audio: { name:'Audio Decryption Protocols', svg: ICO('<path d="M3 12c.667 -4 1.333 -6 4 -6c4 0 4 12 8 12c2.667 0 3.333 -2 4 -6"/>') },
  };
  const ORDER = ['logic','lang','audio'];

  const DOWNLOAD_INTRO = `
    <p>Initializing software architecture for first-run operation. This one-time setup configures the required local processing components and intelligence libraries.</p>
    <p class="notice">Notice: Please keep this window open to ensure successful completion.</p>`;
  const COMPLETE_INTRO = `
    <p>Software architecture initialization complete. All required local processing components and intelligence libraries have been configured successfully.</p>
    <p class="notice">Select Continue to begin droid setup.</p>`;

  function apply(s) {
    document.getElementById('overallPct').textContent = (s.overall|0) + '%';
    document.getElementById('overallFill').style.width = (s.overall|0) + '%';

    const box = document.getElementById('items');
    box.innerHTML = '';
    const byKey = {};
    (s.components || []).forEach(c => byKey[c.key] = c);
    ORDER.forEach(key => {
      const c = byKey[key] || { state:'queued', pct:0, activity:'Waiting…' };
      const m = META[key];
      const cls = c.state==='done' ? 'donerow' : c.state==='going' ? 'goingrow' : '';
      const badge = c.state==='done' ? '<span class="badge done">Ready</span>'
                  : c.state==='going' ? `<span class="badge going">${c.pct|0}%</span>`
                  : c.state==='error' ? '<span class="badge error">Failed</span>'
                  : '<span class="badge queued">Queued</span>';
      const activity = c.activity || (c.state==='done' ? 'Complete' : c.state==='queued' ? 'Waiting…' : '');
      const row = document.createElement('div');
      row.className = 'item ' + cls;
      row.innerHTML = `
        <div class="ic">${m.svg}</div>
        <div class="body">
          <div class="name">${m.name}</div>
          <div class="minitrack"><div class="minifill" style="width:${c.pct|0}%"></div></div>
          <div class="activity">${activity}</div>
        </div>
        ${badge}`;
      box.appendChild(row);
    });

    const intro = document.getElementById('intro');
    const btn = document.getElementById('continueBtn');
    if (s.done) {
      intro.innerHTML = COMPLETE_INTRO;
      btn.disabled = false; btn.textContent = 'Continue';
      btn.onclick = () => { window.location.href = '/setup/start'; };
    } else {
      intro.innerHTML = DOWNLOAD_INTRO;
      btn.disabled = true; btn.textContent = 'Please wait…';
    }
  }

  // ---- live polling (in-app) with offline preview fallback (standalone) ----
  let offline = false, poller = null;
  async function poll() {
    if (offline) { apply(simTick()); return; }
    try {
      const res = await fetch('/setup/provision_status', { cache: 'no-store' });
      if (!res.ok) throw new Error('bad status');
      apply(await res.json());
    } catch (e) {
      offline = true;              // no server -> preview mode
      apply(simTick());
    }
  }

  fetch('/setup/provision_start', { method: 'POST' }).catch(() => {});
  apply({ overall:0, done:false, components: ORDER.map(k => ({key:k, state:'queued', pct:0})) });
  poller = setInterval(poll, 1000);
  poll();

  // ---- preview-only simulation (never runs inside the app) ----
  let _t = 0;
  function simTick() {
    _t += 2;
    const seq = [
      { at:0,  logic:['going', 'Extracting ggml-cuda.dll'] },
      { at:20, logic:['done'], lang:['going','Pulling model layer 2 of 5'] },
      { at:70, lang:['done'], audio:['going','Fetching model.bin'] },
      { at:95, audio:['done'] },
    ];
    const st = { logic:{state:'queued',pct:0}, lang:{state:'queued',pct:0}, audio:{state:'queued',pct:0} };
    let overall = Math.min(100, _t);
    seq.forEach(step => {
      Object.keys(step).forEach(k => {
        if (k==='at') return;
        const [state, act] = step[k];
        if (_t >= step.at) { st[k].state = state; st[k].activity = act; }
      });
    });
    ['logic','lang','audio'].forEach(k => {
      if (st[k].state==='done') st[k].pct = 100;
      else if (st[k].state==='going') st[k].pct = Math.min(99, ((_t - 0) % 100));
    });
    // rough per-phase percents for a believable preview
    if (st.logic.state==='going') st.logic.pct = Math.min(99, _t*5);
    if (st.lang.state==='going')  st.lang.pct  = Math.min(99, (_t-20)*2);
    if (st.audio.state==='going') st.audio.pct = Math.min(99, (_t-70)*4);
    const done = _t >= 100;
    if (done) ['logic','lang','audio'].forEach(k => { st[k].state='done'; st[k].pct=100; });
    return { overall: done?100:overall, done, components: ORDER.map(k => ({ key:k, ...st[k] })) };
  }
</script>
